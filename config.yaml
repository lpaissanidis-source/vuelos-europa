# ============================================================
# BUSCADOR DE VUELOS BARATOS DESDE MADRID - EUROPA
# ============================================================
# Busca el fin de semana 5-7 junio 2026 en 15 destinos europeos.
#
# PASAJEROS: 1 persona por busqueda → precio POR PERSONA.
# Para reservar 2 tickets: compralos por separado y elegis
# el equipaje que quieras en cada uno (carry-on, mochila, etc.)
#
# UMBRALES: precio por PERSONA (ida + vuelta)
#   - Destinos cercanos : 100 EUR/persona
#   - Europa Central    : 110 EUR/persona
#   - Destinos lejanos  : 120 EUR/persona
#
# IMPORTANTE SOBRE HORARIOS:
# El sistema no filtra por hora de salida/llegada.
# Cuando recibas una alerta, revisa en Google Flights si hay
# opciones para ese precio que salgan despues de las 15h el
# viernes y lleguen a MAD despues de las 17h el domingo.
# ============================================================

rutas:

